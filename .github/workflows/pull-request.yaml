name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - closed
      - synchronize

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: yarn
      - name: Install dependencies
        run: |
          yarn install --frozen-lockfile --ignore-scripts
          npx playwright install
      - name: Build cli
        run: |
          yarn workspace @colibrijs/cli build
          yarn install --frozen-lockfile
      - name: Build storybook
        run: yarn workspace @colibrijs/core build
      - name: Upload storybook to artifact
        uses: actions/upload-artifact@v3
        with:
          name: storybook
          path: ./packages/core/storybook-static
      - name: Build example
        run: yarn workspace @colibrijs/example build
      - name: Upload example build to artifact
        uses: actions/upload-artifact@v3
        with:
          name: example
          path: ./example/dist

  test:
    if: github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: yarn
      - name: Install dependencies
        run: |
          yarn install --frozen-lockfile --ignore-scripts
          npx playwright install
      - name: Lint code
        run: yarn lint
      - if: github.event_name == 'pull_request'
        name: Validate commits in pull request
        run: yarn commitlint --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} --to ${{ github.event.pull_request.head.sha }} --verbose
      - name: Run tests
        run: yarn test
      - name: Build storybook
        run: yarn workspace @colibrijs/core build
      - name: Test interactions
        run: yarn test:interactions
      - name: Upload storybook to artifact
        uses: actions/upload-artifact@v3
        with:
          name: storybook
          path: ./packages/core/storybook-static

  deploy-storybook:
    if: github.event.action != 'closed'
    needs: test
    uses: ./.github/workflows/deploy-storybook.yaml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

  remove-storybook:
    if: github.event.action == 'closed'
    uses: ./.github/workflows/remove-storybook.yaml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

  deploy-example:
    if: github.event.action != 'closed'
    needs: test
    uses: ./.github/workflows/deploy-example.yaml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

  remove-example:
    if: github.event.action == 'closed'
    uses: ./.github/workflows/remove-example.yaml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

  deploy:
    if: github.event.action != 'closed'
    uses: ./.github/workflows/deploy.yaml
    needs: test
    secrets: inherit
    permissions:
      packages: write

  remove-deploy:
    if: github.event.action == 'closed'
    secrets: inherit
    permissions:
      packages: write
    uses: ./.github/workflows/remove-deploy.yaml
