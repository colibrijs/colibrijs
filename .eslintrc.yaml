env:
  browser: true
  es2021: true
  node: true
extends:
  - eslint:recommended
  - plugin:@typescript-eslint/recommended
  - plugin:import/recommended
  - plugin:import/typescript
  - plugin:eslint-comments/recommended
  - plugin:prettier/recommended
parser: '@typescript-eslint/parser'
parserOptions:
  ecmaVersion: latest
  sourceType: module
  project:
    - ./tsconfig.json
    - ./packages/*/tsconfig.json
plugins:
  - '@typescript-eslint'
settings:
  import/resolver:
    typescript: {}
rules:
  eslint-comments/require-description: error
  # This rule is offed, because we use esm-modules and some external packages are commonjs modules.
  # And theirs "module.exports" dont't work in esm
  import/no-named-as-default-member: off
  import/order:
    - error
    - newlines-between: always-and-inside-groups
      groups:
        - ['builtin', 'external']
        - ['parent', 'sibling']
        - 'index'
      alphabetize:
        order: 'asc'
        caseInsensitive: true
overrides:
  - files: ['*.spec.ts']
    plugins: ['jest']
    extends: ['plugin:jest/all']
    rules:
      'jest/valid-title':
        - error
        - ignoreTypeOfDescribeName: true
