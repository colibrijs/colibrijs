apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: colibrijs-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    # All requests to api.colibrijs.io will be proxied to the service with name "colibrijs-api" that
    # accepts requests on the port 3000
    - host: api.colibrijs.io
      http:
        paths:
          - pathType: Prefix
            path: '/'
            backend:
              service:
                name: colibrijs-api
                port:
                  number: 3000
